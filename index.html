<!DOCTYPE html>
<html>
    <head>
        <title>Word Processor - Menu</title>
        <link rel="icon" type="image/png" href="img/favicon.png">
        <link rel="apple-touch-icon" href="img/favicon.png">

        <meta charset="UTF-8">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://gstatic.com" crossorigin>

        <link href="https://googleapis.com/css2?family=Comfortaa:wght@300..700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">

        
    </head>
    <body>
        <h1>My Documents</h1>
        
        <div class="toolbar-menu">
            <button id="btn_open_folder" class="toolbar button" style="width: auto; padding: 0 15px;">
                Select Folder
            </button>
            <button id="btn_new_doc" class="toolbar button" style="width: auto; padding: 0 15px; background-color: #48c948;">
                New Document
            </button>
            <button id="btn_dark_mode" class="toolbar button" style="width: auto; padding: 0 15px; font-size: 18px;">
                🌙
            </button>
        </div>

        <div id="grid" class="grid"></div>

        <script src="menu.js"></script>
    </body>
</html>
