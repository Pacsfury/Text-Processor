
<!DOCTYPE html>
<html>
    <head>
        <title>Word Processor - Editor</title>
        <link rel="icon" type="image/png" href="img/favicon.png">
        <link rel="apple-touch-icon" href="img/favicon.png">

        <meta charset="UTF-8">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://gstatic.com" crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">


        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="toolbar">
            <button id="btn_home"><img src="img/home.png" alt="Menu"></button>
            <input id="inp_name" placeholder="File name">
            <button id="btn_bold"><b>B</b></button>
            <button id="btn_italic"><i>I</i></button>
            <button id="btn_underl"><u>U</u></button>
            <input type="text" placeholder="Font" id="inp_font">
            <button id="btn_font">Apply</button>
            <input type="text" placeholder="HEX Color" id="inp_color">
            <button id="btn_color">Apply</button>
            <button id="btn_dark_mode">🌙</button>
        </div>

        <p contenteditable="true">Edit Me!</p>

        <script src="script.js"></script>

    </body>
</html>
